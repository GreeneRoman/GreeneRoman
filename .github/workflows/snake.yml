name: Generate Immersive Graph Animation

on:
  schedule:
    - cron: "0 */12 * * *" # Generates fresh animations automatically every 12 hours
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Required to push the generated SVG back to the repo

    steps:
      # Generates the contribution grid animation with the custom burnt-orange snake
      - name: Generate Custom Snake Grid Asset
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#e67e22
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#e67e22
      # Pushes the generated SVG files to your 'output' branch
      - name: Deploy Animated Assets to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
