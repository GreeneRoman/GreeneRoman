name: Generate Immersive Graph Animation

on:
  schedule:
    - cron: "0 */12 * * *" # Generates fresh animations automatically every 12 hours
  workflow_dispatch: # Allows manual button triggers

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # This grants the bot permission to push the final animation

    steps:
      # Generates the custom-themed animation from your grid data
      - name: Generate Custom Snake Grid Asset
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#8a8a8a&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#e67e22&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      # Pushes the generated SVG vector graphics files to a clean separate deployment branch
      - name: Deploy Animated Assets to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
